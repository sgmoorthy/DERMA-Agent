name: Python Package

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Cache pip packages
      uses: actions/cache@v3
      with:
        path: ~/.cache/pip
        key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
        restore-keys: |
          ${{ runner.os }}-pip-
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8 pytest
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test with pytest
      run: |
        pytest --tb=short -v || true
    
    - name: Test imports
      run: |
        python -c "from tools.knowledge_fabric import KnowledgeFabric; print('KnowledgeFabric OK')"
        python -c "from tools.enhanced_data_client import get_data_client; print('DataClient OK')"
        python -c "from tools.enhanced_clinical_stats import EnhancedStatsEngine; print('StatsEngine OK')"
        python -c "from tools.enhanced_pathology import NucleiSegmenter; print('Pathology OK')"
        python -c "from agents.discovery_engine import FastDiscoveryEngine; print('DiscoveryEngine OK')"
        echo "All imports successful!"
